name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Build + Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore
        shell: pwsh
        run: dotnet restore Claude.Core.Tests/Claude.Core.Tests.csproj
      - name: Build
        shell: pwsh
        run: dotnet build Claude.Core.Tests/Claude.Core.Tests.csproj -c Release --no-restore
      - name: Test
        shell: pwsh
        run: dotnet test Claude.Core.Tests/Claude.Core.Tests.csproj -c Release --no-build -v normal

  lint:
    name: Lint C# (format + analyzers)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore
        shell: pwsh
        run: dotnet restore MegaSchoen.sln
      # Formatting gate: whitespace / end-of-line per .editorconfig, across all .cs in
      # the solution. (Style/analyzer categories are NOT run here: dotnet format's
      # workspace mis-reports CA1416 platform-compat on the Windows-only MAUI code,
      # which the authoritative MSBuild build does not — see the analyzer gate below.)
      - name: Format check (whitespace)
        shell: pwsh
        run: dotnet format whitespace MegaSchoen.sln --verify-no-changes --no-restore
      # Analyzer gate: zero warnings (Roslyn + Roslynator) as errors. Covers the managed
      # projects that build under the dotnet CLI. DisplayManager.Core, DisplayManagerCLI
      # and MegaSchoen reference the native DisplayManagerNative.vcxproj (and MegaSchoen is
      # MAUI), so they require MSBuild + the C++/MAUI toolchain and are gated locally via
      # `MSBuild MegaSchoen.sln -warnaserror` (see CLAUDE.md), not on this dotnet-only runner.
      - name: Analyzer gate (warnings as errors)
        shell: pwsh
        run: |
          dotnet build Claude.Core.Tests/Claude.Core.Tests.csproj -c Release --no-restore -warnaserror
          dotnet build ClaudeSessionsCLI/ClaudeSessionsCLI.csproj -c Release --no-restore -warnaserror
          dotnet build ClaudeHookBridge/ClaudeHookBridge.csproj -c Release --no-restore -warnaserror

  lint-cpp:
    name: Lint C++ (cppcheck)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Resolve cppcheck self-contained, no package manager. The self-hosted Windows
      # runner executes as SYSTEM with neither `choco` nor cppcheck on PATH, so the
      # original `choco install cppcheck` failed ("term not recognized") and the analysis
      # never ran. Prefer an already-installed cppcheck (PATH or standard Program Files
      # location); otherwise download the pinned official MSI from GitHub releases and
      # silent-install it (SYSTEM is elevated). Pinned version => stable finding set.
      # The resolved directory is exported to GITHUB_PATH for the analysis step.
      - name: Resolve cppcheck
        shell: pwsh
        env:
          # Pinned to the version validated locally against the .cpp (0 findings).
          # Bump deliberately + re-validate, since a new cppcheck can surface new checks.
          CPPCHECK_VERSION: "2.19.0"
        run: |
          $ErrorActionPreference = 'Stop'
          $candidates = @(
            "$env:ProgramFiles\Cppcheck\cppcheck.exe",
            "${env:ProgramFiles(x86)}\Cppcheck\cppcheck.exe"
          )
          $cppcheck = Get-Command cppcheck -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty Source
          if (-not $cppcheck) { $cppcheck = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1 }
          if (-not $cppcheck) {
            $ver = $env:CPPCHECK_VERSION
            $msi = Join-Path $env:RUNNER_TEMP "cppcheck-$ver-x64-Setup.msi"
            $url = "https://github.com/danmar/cppcheck/releases/download/$ver/cppcheck-$ver-x64-Setup.msi"
            Write-Host "cppcheck not present; downloading $url"
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            Invoke-WebRequest -Uri $url -OutFile $msi -UseBasicParsing
            $log = Join-Path $env:RUNNER_TEMP "cppcheck-msi.log"
            $p = Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /qn /norestart /l*v `"$log`"" -Wait -PassThru
            if ($p.ExitCode -ne 0) { Get-Content $log -Tail 30; throw "cppcheck MSI install failed ($($p.ExitCode))" }
            $cppcheck = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $cppcheck) { throw "cppcheck still not found after install" }
          $dir = Split-Path -Parent $cppcheck
          Add-Content -Path $env:GITHUB_PATH -Value $dir
          & $cppcheck --version
      # The vendored single-header json.hpp (nlohmann/json) is excluded from analysis.
      # The three suppressed info-level IDs are meta-diagnostics, not code findings:
      # --enable=all turns on `information` reporting and --error-exitcode trips on it.
      #   unmatchedSuppression       - json.hpp's own inline // cppcheck-suppress comments
      #                                don't match under our config (the file is excluded)
      #   toomanyconfigs             - the header's #ifdef matrix exceeds cppcheck's cap
      #   normalCheckLevelMaxBranches - cppcheck self-limits branch analysis depth
      # All real checks (error/warning/style/performance/portability) stay active.
      - name: cppcheck
        shell: pwsh
        run: >
          cppcheck --enable=all --inline-suppr
          --suppress=missingIncludeSystem --suppress=*:*json.hpp
          --suppress=unmatchedSuppression --suppress=toomanyconfigs
          --suppress=normalCheckLevelMaxBranches
          --error-exitcode=1
          DisplayManagerNative/DisplayManagerNative.cpp

  # ── AI-slop gate (aislop) ────────────────────────────────────────────────────
  # aislop's C# engine ships in the mtschoen/aislop fork (upstream npm has no C#).
  # The fork is published as @schoen/aislop to the self-hosted Gitea npm registry
  # (see .npmrc): a prebuilt, integrity-pinned tarball, so the runner does not
  # rebuild from source (the previous github-commit git dep rebuilt on the runner
  # and hit the POSIX-only build script). roslynator (installed below) is aislop's
  # C# analysis backend; without it the C# pass is heuristic-only. Threshold and
  # excludes live in .aislop/config.yml (failBelow gates the whole-repo score).
  # Bump the pinned version deliberately + re-validate (a newer ruleset can
  # surface new findings).
  aislop:
    name: Lint AI-slop (aislop)
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      # Trust Gitea's self-signed (mkcert) cert so npx can pull @schoen/aislop
      # from the Gitea registry. Appends to Node's CA bundle (public deps still
      # verify), unlike the blanket NODE_TLS_REJECT_UNAUTHORIZED=0 elsewhere.
      NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/.gitea-ca.pem
    steps:
      - uses: actions/checkout@v4
      # No actions/setup-node here: this is a host-mode Windows runner with
      # Node LTS pre-installed (v24, the same node actions/checkout uses). On
      # host mode setup-node@v4 tries to download a node .7z and extract it with
      # act's bundled 7zr.exe, which fails with exit code 2 and breaks the job.
      # The host node (>= aislop's node>=20 floor) serves npx directly.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Install roslynator (aislop's C# analysis backend)
        shell: pwsh
        run: dotnet tool install -g roslynator.dotnet.cli
      - name: aislop CI gate (whole-repo score >= failBelow)
        shell: pwsh
        run: npx --yes "@schoen/aislop@0.10.1" ci .
