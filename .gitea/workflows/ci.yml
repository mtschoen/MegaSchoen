name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Build + Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      NODE_EXTRA_CA_CERTS: C:\actions-runner\mkcert-ca.pem
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore
        shell: pwsh
        run: dotnet restore Claude.Core.Tests/Claude.Core.Tests.csproj
      - name: Build
        shell: pwsh
        run: dotnet build Claude.Core.Tests/Claude.Core.Tests.csproj -c Release --no-restore
      - name: Test
        shell: pwsh
        run: dotnet test Claude.Core.Tests/Claude.Core.Tests.csproj -c Release --no-build -v normal
