# aislop — AI-slop quality gate (https://github.com/scanaislop/aislop)
#
# STATUS: ENABLED (2026-06-01). aislop's C# engine ships in the mtschoen/aislop fork
# and this repo scans clean at 100/100, so the CI gate (the `aislop` job in
# .gitea/workflows/ci.yml) is now live. It complements - does not replace - the Roslyn
# + Roslynator + `dotnet format` gate (see Directory.Build.props / .editorconfig). aislop
# covers the C# only; the C++ in DisplayManagerNative/ stays on clang-tidy/cppcheck.
#
# How CI runs it: `npx --yes "github:mtschoen/aislop#<commit>" ci .` - pinned to a fork
# COMMIT, never npm and never @latest. Upstream npm aislop reuses version 0.10.1 with NO
# C# engine, so a version pin would false-green; only the github-commit ref gets C#.
#
# NOT enabled: the on-save hook (`aislop hook install --claude --project`). It would pin
# the hook to an npm version (no C# = useless here) and cannot easily target the fork
# commit, so until the fork's C# support lands on npm, run `aislop scan .` manually
# (the globally-installed fork build has the C# rules) and rely on the CI gate.

ci:
  failBelow: 80          # fleet baseline (matches git-wizard)

exclude:
  - "**/obj/**"
  - "**/bin/**"
  - "**/*.g.cs"          # generated (XAML, source generators)
  - "**/*.Designer.cs"   # generated designer code
  - "DisplayManagerNative/**"   # C++ — aislop does not support C++ (json.hpp is vendored)
